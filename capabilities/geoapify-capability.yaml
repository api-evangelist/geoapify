naftiko: 1.0.0-alpha2
info:
  label: Geoapify Forward Geocoding API
  description: Geoapify's Forward Geocoding API for searching addresses worldwide. This API accepts both structured and free-form
    addresses and returns results in JSON, GeoJSON, or XML formats.
  tags:
  - Geoapify
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: geoapify
    baseUri: https://api.geoapify.com/v1
    description: Geoapify Forward Geocoding API HTTP API.
    resources:
    - name: geocode-search
      path: /geocode/search
      operations:
      - name: get-geocode-search
        method: GET
        description: Forward Geocoding
        inputParameters:
        - name: apiKey
          in: query
          type: string
          required: true
          description: Your API key for accessing the Geoapify API.
        - name: text
          in: query
          type: string
          description: Free-form address input.
        - name: name
          in: query
          type: string
          description: Amenity or place name as part of a structured address.
        - name: housenumber
          in: query
          type: string
          description: House number for a structured address.
        - name: street
          in: query
          type: string
          description: Street name for a structured address.
        - name: postcode
          in: query
          type: string
          description: Postal code or ZIP code.
        - name: city
          in: query
          type: string
          description: City name.
        - name: state
          in: query
          type: string
          description: State name.
        - name: country
          in: query
          type: string
          description: Country name.
        - name: type
          in: query
          type: string
          description: Location type filter to narrow down search by type.
        - name: lang
          in: query
          type: string
          description: Language code for the response (2-character ISO 639-1).
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
        - name: filter
          in: query
          type: string
          description: Filter results by location constraints (e.g., country, boundary).
        - name: bias
          in: query
          type: string
          description: Location bias to prioritize search results by proximity or area.
        - name: format
          in: query
          type: string
          description: Response format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: geoapify-rest
    description: REST adapter for Geoapify Forward Geocoding API.
    resources:
    - path: /geocode/search
      name: get-geocode-search
      operations:
      - method: GET
        name: get-geocode-search
        description: Forward Geocoding
        call: geoapify.get-geocode-search
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: geoapify-mcp
    transport: http
    description: MCP adapter for Geoapify Forward Geocoding API for AI agent use.
    tools:
    - name: get-geocode-search
      description: Forward Geocoding
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: geoapify.get-geocode-search
      with:
        apiKey: tools.apiKey
        text: tools.text
        name: tools.name
        housenumber: tools.housenumber
        street: tools.street
        postcode: tools.postcode
        city: tools.city
        state: tools.state
        country: tools.country
        type: tools.type
        lang: tools.lang
        limit: tools.limit
        filter: tools.filter
        bias: tools.bias
        format: tools.format
      inputParameters:
      - name: apiKey
        type: string
        description: Your API key for accessing the Geoapify API.
        required: true
      - name: text
        type: string
        description: Free-form address input.
      - name: name
        type: string
        description: Amenity or place name as part of a structured address.
      - name: housenumber
        type: string
        description: House number for a structured address.
      - name: street
        type: string
        description: Street name for a structured address.
      - name: postcode
        type: string
        description: Postal code or ZIP code.
      - name: city
        type: string
        description: City name.
      - name: state
        type: string
        description: State name.
      - name: country
        type: string
        description: Country name.
      - name: type
        type: string
        description: Location type filter to narrow down search by type.
      - name: lang
        type: string
        description: Language code for the response (2-character ISO 639-1).
      - name: limit
        type: integer
        description: Maximum number of results to return.
      - name: filter
        type: string
        description: Filter results by location constraints (e.g., country, boundary).
      - name: bias
        type: string
        description: Location bias to prioritize search results by proximity or area.
      - name: format
        type: string
        description: Response format.
      outputParameters:
      - type: object
        mapping: $.
